name: Deploy only specific files to SFTP

on:
  push:
    branches: [ "main" ]

concurrency:
  group: shoptet-sftp-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SFTP_HOST: ${{ secrets.FTP_HOST }}
      SFTP_USER: ${{ secrets.FTP_USER }}
      SSHPASS: ${{ secrets.FTP_PASS }}
      REMOTE_DIR: /upload/sova

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Výpis dostupných souborů
        run: ls -la

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Check secrets
        run: |
          set -euo pipefail
          echo "::add-mask::$SSHPASS"
          test -n "$SFTP_HOST" || (echo "FTP_HOST missing" && exit 1)
          test -n "$SFTP_USER" || (echo "FTP_USER missing" && exit 1)
          test -n "$SSHPASS" || (echo "FTP_PASS missing" && exit 1)

      - name: Upload selected files if they exist
        run: |
          set -euo pipefail
          echo "::add-mask::$SSHPASS"

          FILES=""
          [ -f FE-sova.js ] && FILES="$FILES FE-sova.js"
          [ -f FE-sova.css ] && FILES="$FILES FE-sova.css"
          [ -f FE-sova-settings.js ] && FILES="$FILES FE-sova-settings.js"

          if [ -z "$FILES" ]; then
            echo "Žádné z cílových souborů neexistují, nic se nenahrává."
            exit 0
          fi

          echo "Nahrávám soubory: $FILES"

          for i in 1 2 3 4 5; do
            echo "SFTP attempt $i/5"

            if sshpass -e sftp \
              -o StrictHostKeyChecking=no \
              -o PreferredAuthentications=password \
              -o PubkeyAuthentication=no \
              -o NumberOfPasswordPrompts=1 \
              -o ConnectTimeout=20 \
              -P 22 \
              "$SFTP_USER@$SFTP_HOST" <<EOF
          mkdir $REMOTE_DIR
          cd $REMOTE_DIR
          put FE-sova.js
          put FE-sova.css
          put FE-sova-settings.js
          bye
EOF
            then
              echo "Upload OK"
              exit 0
            fi

            echo "Upload failed, retrying..."
            sleep $((i * 15))
          done

          echo "Upload failed after retries"
          exit 1

      - name: Verify deployed settings
        run: |
          set -euo pipefail
          curl -fsSL "https://www.pocitarna.cz/user/documents/upload/sova/FE-sova-settings.js?t=$(date +%s)" \
            | grep -q "parametrsovaupgradeBLESK2"

          echo "OK: web servíruje FE-sova-settings.js s parametrsovaupgradeBLESK2"
