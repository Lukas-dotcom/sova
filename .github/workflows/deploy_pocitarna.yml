name: Deploy_pocitarna_cz.yml

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-cz:
    runs-on: ubuntu-latest

    env:
      FTP_HOST_CZ: ${{ secrets.FTP_HOST_CZ }}
      FTP_USER_CZ: ${{ secrets.FTP_USER_CZ }}
      FTP_PASS_CZ: ${{ secrets.FTP_PASS_CZ }}
      REMOTE_DIR: /upload/sova-shoptetFiles/code

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Výpis dostupných souborů
        run: ls -la

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Create remote directory if missing
        run: |
          {
            echo "-mkdir /upload/sova-shoptetFiles"
            echo "-mkdir /upload/sova-shoptetFiles/code"
            echo "bye"
          } > sftp_mkdir.txt

          sshpass -p "$FTP_PASS_CZ" \
            sftp -P 22 -o StrictHostKeyChecking=no \
            "$FTP_USER_CZ@$FTP_HOST_CZ" < sftp_mkdir.txt

      - name: Upload selected CZ files if they exist
        run: |
          FILES=""
          [ -f FE-sova-settings.js ] && FILES="$FILES FE-sova-settings.js"

          if [ -n "$FILES" ]; then
            echo "Nahrávám CZ soubory: $FILES"

            for FILE in $FILES; do
              echo "put $FILE $REMOTE_DIR/$FILE"
            done > sftp_upload.txt
            echo "bye" >> sftp_upload.txt

            sshpass -p "$FTP_PASS_CZ" \
              sftp -P 22 -o StrictHostKeyChecking=no \
              "$FTP_USER_CZ@$FTP_HOST_CZ" < sftp_upload.txt
          else
            echo "Žádné z cílových CZ souborů neexistují, nic se nenahrává."
          fi
