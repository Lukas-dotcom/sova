name: Deploy only specific files to SFTP

on:
  push:
    branches: [ "main" ]

concurrency:
  group: shoptet-sftp-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FTP_HOST: ${{ secrets.FTP_HOST }}
      FTP_USER: ${{ secrets.FTP_USER }}
      SSHPASS: ${{ secrets.FTP_PASS }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Výpis dostupných souborů
        run: ls -la

      - name: Create remote directory if missing
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y sshpass

          echo "::add-mask::$SSHPASS"

          echo "-mkdir /upload" > sftp_mkdir.txt
          echo "-mkdir /upload/sova" >> sftp_mkdir.txt
          echo "bye" >> sftp_mkdir.txt

          sshpass -e sftp \
            -P 22 \
            -o StrictHostKeyChecking=no \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            -o NumberOfPasswordPrompts=1 \
            "$FTP_USER@$FTP_HOST" < sftp_mkdir.txt

      - name: Upload selected files if they exist
        run: |
          set -euo pipefail

          echo "::add-mask::$SSHPASS"

          FILES=""
          [ -f FE-sova.js ] && FILES="$FILES FE-sova.js"
          [ -f FE-sova.css ] && FILES="$FILES FE-sova.css"
          [ -f FE-sova-settings.js ] && FILES="$FILES FE-sova-settings.js"

          if [ -n "$FILES" ]; then
            echo "Nahrávám soubory: $FILES"

            for i in 1 2 3 4 5; do
              echo "Upload attempt $i/5"

              if sshpass -e scp \
                -P 22 \
                -o StrictHostKeyChecking=no \
                -o PreferredAuthentications=password \
                -o PubkeyAuthentication=no \
                -o NumberOfPasswordPrompts=1 \
                $FILES \
                "$FTP_USER@$FTP_HOST:/upload/sova/"
              then
                echo "Upload OK"
                exit 0
              fi

              echo "Upload failed, retrying..."
              sleep $((i * 15))
            done

            echo "Upload failed after retries"
            exit 1
          else
            echo "Žádné z cílových souborů neexistují, nic se nenahrává."
          fi
