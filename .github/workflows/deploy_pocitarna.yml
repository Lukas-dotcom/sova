name: Deploy only specific files to SFTP

on:
  push:
    branches: ["main"]

concurrency:
  group: shoptet-sftp-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    env:
      FTP_HOST: ${{ secrets.FTP_HOST }}
      FTP_USER: ${{ secrets.FTP_USER }}
      SSHPASS: ${{ secrets.FTP_PASS }}
      REMOTE_DIR: /upload/sova

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Výpis dostupných souborů
        run: |
          ls -la

      - name: Install sshpass
        run: |
          set -euo pipefail

          if command -v sshpass >/dev/null 2>&1; then
            echo "sshpass already installed"
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends sshpass

      - name: Check secrets
        run: |
          set -euo pipefail

          if [ -n "${SSHPASS:-}" ]; then
            echo "::add-mask::$SSHPASS"
          fi

          test -n "${FTP_HOST:-}" || (echo "FTP_HOST missing" && exit 10)
          test -n "${FTP_USER:-}" || (echo "FTP_USER missing" && exit 11)
          test -n "${SSHPASS:-}" || (echo "FTP_PASS missing" && exit 12)

          echo "FTP_HOST present"
          echo "FTP_USER present"
          echo "FTP_PASS present"

      - name: Build SFTP upload batch
        run: |
          set -euo pipefail

          {
            echo "-mkdir /upload"
            echo "-mkdir $REMOTE_DIR"
            echo "cd $REMOTE_DIR"
          } > sftp_upload.txt

          UPLOADED_ANY=0

          if [ -f FE-sova.js ]; then
            echo "put FE-sova.js" >> sftp_upload.txt
            UPLOADED_ANY=1
          fi

          if [ -f FE-sova.css ]; then
            echo "put FE-sova.css" >> sftp_upload.txt
            UPLOADED_ANY=1
          fi

          if [ -f FE-sova-settings.js ]; then
            echo "put FE-sova-settings.js" >> sftp_upload.txt
            UPLOADED_ANY=1
          fi

          echo "bye" >> sftp_upload.txt

          echo "UPLOADED_ANY=$UPLOADED_ANY" >> "$GITHUB_ENV"

          echo "SFTP batch:"
          sed 's/^/  /' sftp_upload.txt

      - name: Upload selected files with retry
        if: env.UPLOADED_ANY == '1'
        run: |
          set -euo pipefail
          echo "::add-mask::$SSHPASS"

          for i in 1 2 3 4 5; do
            echo "SFTP upload attempt $i/5"

            if sshpass -e sftp \
              -P 22 \
              -o StrictHostKeyChecking=no \
              -o PreferredAuthentications=password \
              -o PubkeyAuthentication=no \
              -o NumberOfPasswordPrompts=1 \
              -o ConnectTimeout=20 \
              -b sftp_upload.txt \
              "$FTP_USER@$FTP_HOST"
            then
              echo "Upload OK"
              exit 0
            fi

            echo "Upload failed, retrying..."
            sleep $((i * 15))
          done

          echo "Upload failed after retries"
          exit 1

      - name: Nothing to upload
        if: env.UPLOADED_ANY != '1'
        run: |
          echo "Žádné z cílových souborů neexistují, nic se nenahrává."

      - name: Verify deployed FE settings
        if: env.UPLOADED_ANY == '1'
        run: |
          set -euo pipefail

          if [ ! -f FE-sova-settings.js ]; then
            echo "FE-sova-settings.js nebyl v commitu, veřejnou verzi neověřuji."
            exit 0
          fi

          echo "Ověřuji veřejně dostupný FE-sova-settings.js..."

          curl -fsSL "https://www.pocitarna.cz/user/documents/upload/sova/FE-sova-settings.js?t=$(date +%s)" \
            -o /tmp/deployed-FE-sova-settings.js

          if grep -q "parametrsovaupgradeBLESK2" /tmp/deployed-FE-sova-settings.js; then
            echo "OK: web servíruje FE-sova-settings.js s parametrsovaupgradeBLESK2"
          else
            echo "ERROR: web stále neservíruje očekávanou verzi FE-sova-settings.js"
            echo "Ukázka výskytů:"
            grep -n "BLESK2\|sovaupgrade" /tmp/deployed-FE-sova-settings.js | head -40 || true
            exit 20
          fi
